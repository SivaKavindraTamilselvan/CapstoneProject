<section class="bg-white px-8 py-8">
  <div class="pb-8 relative flex items-center justify-center">
    <h1 class="text-blue-950 font-extrabold text-center text-xl sm:text-2xl">{{pageTitle()}}</h1>
    <div class="absolute right-0 flex items-center gap-2">
      @if(filterApplied()){
      <button type="button" class="sm:p-2 hover:bg-gray-100 cursor-pointer rounded-md" (click)="resetFilters()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
          class="w-6 h-6">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
        </svg>
      </button>
      }
      <button (click)="toggleFilterPanel()" class="hover:bg-gray-100 cursor-pointer rounded-md">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-blue-950" fill="none" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
    </div>
  </div>

  <app-filter-component [open]="filterPanelOpen()" title="Attribute Filters" (close)="closeFilterPanel()"
    [errorMessage]="filterErrorMessage()" (toggle)="toggleFilterPanel()" (apply)="applyFilters()"
    (reset)="resetFilters()">

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Added Admin</label>
      <input type="number" placeholder="Admin ID" [formField]="filterForm.addedByAdminId"
        class="border border-gray-400 rounded-md px-3 py-2 w-full" />
      @if (filterForm.addedByAdminId().invalid())
      {
      <p class="text-red-600 text-xs mt-1">{{ filterForm.addedByAdminId().errors()[0].message }}</p>
      }
    </div>
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Category</label>
      <select (change)="onCategoryChange($event)" [value]="productCategoryId() ?? ''"
        class="border border-gray-400 rounded-md px-3 py-2 w-full">
        <option value="">All</option>
        @for(cat of categories(); track cat.productCategoryId) {
        <option [value]="cat.productCategoryId">
          {{cat.productCategoryName}}
        </option>
        }
      </select>
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Sub Category</label>
      <select (change)="onSubcategoryChange($event)" [value]="productSubCategoryId() ?? ''"
        class="border border-gray-400 rounded-md px-3 py-2 w-full" [disabled]="!productCategoryId()">
        @if(!productCategoryId()) {
        <option value="">Select category first</option>
        }
        @else{
        <option value="">All</option>
        }
        @for(sub of subCategories(); track sub.productSubCategoryId) {
        <option [value]="sub.productSubCategoryId">
          {{sub.productSubCategoryName}}
        </option>
        }
      </select>
    </div>
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Attribute Id</label>
      <select (change)="onFilterFormAttributeChange($event)" [value]="attributeMasterId() ?? ''"
        class="border border-gray-400 rounded-md px-3 py-2 w-full">
        <option value="">All</option>
        @for(sub of masterattribute()?.items ?? []; track sub.attributeMasterId) {
        <option [value]="sub.attributeMasterId">
          {{sub.attributeName}}
        </option>
        }
      </select>
    </div>


  </app-filter-component>
  @if(categoryStatus()==null){

  <div class="flex justify-end pb-4">
    <h1 class="px-4 bg-blue-700 text-white font-semibold py-2 rounded-md cursor-pointer" (click)="openAddPopup()"> Add
      Mapped Attribute</h1>
  </div>
  }



  <app-data-table-component [columns]="columns" [rows]="attribute()?.items ?? []" [actions]="actions()"
    (action)="handleAction($event)">
  </app-data-table-component>

  <app-mobile-card-component [columns]="mobileColumns" [rows]="attribute()?.items ?? []" [actions]="actions()"
    (action)="handleAction($event)" [titleKey]="'productSubCategoryAttributeId'">
  </app-mobile-card-component>

  <app-pagination-component [pageNumber]="pageNumber()" [totalPages]="totalPages()"
    [totalCount]="attribute()?.totalCount ?? 0" [pageSize]="pageSize()" (previous)="previousPage()" (next)="nextPage()"
    (pageSizeChange)="onPageSizeChanged($event)">
  </app-pagination-component>
  <app-popup-component [show]="showPopup()" [title]="popupTitle()" [titleClass]="titleClass()"
    [message]="popupMessage()" [confirmText]="popupConfirmText()" cancelText="Cancel"
    [confirmButtonClass]="popupButtonClass()" (confirm)="confirmPopup()" (cancel)="closePopup()">
  </app-popup-component>


  @if (showActivatePopup()) {
  <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-2xl w-96 p-6">
      <h1 class="text-2xl font-bold text-blue-950 text-center mb-4">
        Add Mapped Attribute
      </h1>

      <form (ngSubmit)="addAttribute()">

        <div>
          <label class="block text-sm font-semibold text-gray-700 my-2 p-2">Category</label>
          <select (change)="onCategoryChange($event)" class="border border-gray-400 rounded-md px-3 py-2 w-full">
            <option value="">All</option>
            @for(cat of categories(); track cat.productCategoryId) {
            <option [value]="cat.productCategoryId" [selected]="productCategoryId() === cat.productCategoryId">
              {{cat.productCategoryName}}
            </option>
            }
          </select>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 my-2 p-2">Sub Category</label>
          <select (change)="onAddFormSubcategoryChange($event)"
            class="border border-gray-400 rounded-md px-3 py-2 w-full" [disabled]="!productCategoryId()">
            @if(!productCategoryId()) {
            <option value="">Select category first</option>
            }
            @else{
            <option value="">All</option>
            }
            @for(sub of subCategories(); track sub.productSubCategoryId) {
            <option [value]="sub.productSubCategoryId">
              {{sub.productSubCategoryName}}
            </option>
            }
          </select>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 my-2 p-2">Attribute</label>
          <select (change)="onAddFormAttributeChange($event)"
            class="border border-gray-400 rounded-md px-3 py-2 w-full">
            <option value="">All</option>
            @for(sub of masterattribute()?.items ?? []; track sub.attributeMasterId) {
            <option [value]="sub.attributeMasterId">
              {{sub.attributeName}}
            </option>
            }
          </select>
        </div>

        <div class="flex justify-end gap-3 mt-5">
          <button type="button" class="px-4 py-2 rounded-lg bg-gray-300 hover:bg-gray-400" (click)="closeAddPopup()">
            Cancel
          </button>

          <button type="submit" class="px-4 py-2 rounded-lg bg-blue-700 text-white hover:bg-blue-900">
            Add
          </button>
        </div>
      </form>
    </div>
  </div>
  }
</section>
