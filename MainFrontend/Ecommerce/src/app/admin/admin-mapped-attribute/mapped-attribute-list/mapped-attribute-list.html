<section class="bg-white px-8 py-8">
  <div class="pb-8 relative flex items-center justify-center">
    <h1 class="text-blue-950 font-extrabold text-center text-2xl">Product Category</h1>
    <button (click)="toggleFilterPanel()" class="absolute right-0 p-2 rounded-md hover:bg-gray-100 cursor-pointer">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-blue-950" fill="none" viewBox="0 0 24 24"
        stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
  </div>

  <app-filter-component [open]="filterPanelOpen()" title="Attribute Filters" (close)="closeFilterPanel()"
    (apply)="applyFilters()" (reset)="resetFilters()">

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Added Admin</label>
      <input type="number" placeholder="Admin ID" [value]="addedByAdminId()" (input)="onAdminIdInput($event)"
        class="border border-gray-400 rounded-md px-3 py-2 w-full" />
    </div>
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Sub Category Id</label>
      <input type="number" placeholder="Category ID" [value]="productSubCategoryId()"
        (input)="onSubCategoryIdInput($event)" class="border border-gray-400 rounded-md px-3 py-2 w-full" />
    </div>
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Category</label>
      <select (change)="onCategoryChange($event)" class="border border-gray-400 rounded-md px-3 py-2 w-full">
        <option value="">All</option>
        @for(cat of categories(); track cat.productCategoryId) {
        <option [value]="cat.productCategoryId" [selected]="productCategoryId() === cat.productCategoryId">
          {{cat.productCategoryName}}
        </option>
        }
      </select>
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Sub Category</label>
      <select (change)="onSubcategoryChange($event)" class="border border-gray-400 rounded-md px-3 py-2 w-full"
        [disabled]="!productCategoryId()">
        @if(!productCategoryId()) {
        <option value="">Select category first</option>
        }
        @else{
        <option value="">All</option>
        }
        @for(sub of subCategories(); track sub.productSubCategoryId) {
        <option [value]="sub.productSubCategoryId" [selected]="productSubCategoryId() === sub.productSubCategoryId">
          {{sub.productSubCategoryName}}
        </option>
        }
      </select>
    </div>
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Attribute Id</label>
      <input type="number" placeholder="Category ID" [value]="attributeMasterId()"
        (input)="onAttributeMasterIdInput($event)" class="border border-gray-400 rounded-md px-3 py-2 w-full" />
    </div>

    <div>
      <label class="text-sm font-semibold text-gray-700 mb-1">Status</label>
      <select (change)="onStatusChange($event)" class="border border-gray-400 rounded-md px-3 py-2 w-full">
        <option>All</option>
        <option value="true" [selected]="status() === true">Active</option>
        <option value="false" [selected]="status() === false">Inactive</option>
      </select>
    </div>

  </app-filter-component>

  <div class="flex justify-end pb-4">
    <h1 class="px-4 bg-blue-700 text-white font-semibold py-2 rounded-md cursor-pointer" (click)="openPopup()"> Add
      Mapped Attribute</h1>
  </div>

  <app-data-table-component [columns]="columns" [rows]="attribute()?.items ?? []" [actions]="actions"
    (action)="handleAction($event)">
  </app-data-table-component>

  <app-mobile-card-component [columns]="mobileColumns" [rows]="attribute()?.items ?? []" [actions]="actions"
    (action)="handleAction($event)" [titleKey]="'productSubCategoryAttributeId'">
  </app-mobile-card-component>

  <app-pagination-component [pageNumber]="pageNumber()" [totalPages]="totalPages()"
    [totalCount]="attribute()?.totalCount ?? 0" [pageSize]="pageSize()" (previous)="previousPage()" (next)="nextPage()"
    (pageSizeChange)="onPageSizeChanged($event)">
  </app-pagination-component>

  @if(filterPanelOpen()) {
  <div class="fixed inset-0 bg-black/40 z-40" (click)="toggleFilterPanel()"></div>
  }

  <aside
    class="fixed top-0 right-0 h-full w-full sm:w-96 bg-white z-50 shadow-2xl transform transition-transform duration-300"
    [class.translate-x-0]="filterPanelOpen()" [class.translate-x-full]="!filterPanelOpen()">

    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
      <h2 class="text-lg font-bold text-blue-950">Filters</h2>
      <button (click)="toggleFilterPanel()" class="p-2 rounded-md hover:bg-gray-100 cursor-pointer">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <div class="flex flex-col gap-4 p-6">

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Added Admin</label>
        <input type="number" placeholder="Admin ID" [value]="addedByAdminId()" (input)="onAdminIdInput($event)"
          class="border border-gray-400 rounded-md px-3 py-2 w-full" />
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Sub Category Id</label>
        <input type="number" placeholder="Category ID" [value]="productSubCategoryId()"
          (input)="onSubCategoryIdInput($event)" class="border border-gray-400 rounded-md px-3 py-2 w-full" />
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Category</label>
        <select (change)="onCategoryChange($event)" class="border border-gray-400 rounded-md px-3 py-2 w-full">
          <option value="">All</option>
          @for(cat of categories(); track cat.productCategoryId) {
          <option [value]="cat.productCategoryId" [selected]="productCategoryId() === cat.productCategoryId">
            {{cat.productCategoryName}}
          </option>
          }
        </select>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Sub Category</label>
        <select (change)="onSubcategoryChange($event)" class="border border-gray-400 rounded-md px-3 py-2 w-full"
          [disabled]="!productCategoryId()">
          @if(!productCategoryId()) {
          <option value="">Select category first</option>
          }
          @else{
          <option value="">All</option>
          }
          @for(sub of subCategories(); track sub.productSubCategoryId) {
          <option [value]="sub.productSubCategoryId" [selected]="productSubCategoryId() === sub.productSubCategoryId">
            {{sub.productSubCategoryName}}
          </option>
          }
        </select>
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Attribute Id</label>
        <input type="number" placeholder="Category ID" [value]="attributeMasterId()"
          (input)="onAttributeMasterIdInput($event)" class="border border-gray-400 rounded-md px-3 py-2 w-full" />
      </div>

      <div>
        <label class="text-sm font-semibold text-gray-700 mb-1">Status</label>
        <select (change)="onStatusChange($event)" class="border border-gray-400 rounded-md px-3 py-2 w-full">
          <option>All</option>
          <option value="true" [selected]="status() === true">Active</option>
          <option value="false" [selected]="status() === false">Inactive</option>
        </select>
      </div>

      <div class="flex gap-2 pt-2">
        <button (click)="applyFilters()"
          class="bg-blue-800 text-white font-bold py-2 px-4 rounded-md hover:bg-blue-950 cursor-pointer w-full">
          Apply Filters
        </button>
        <button (click)="resetFilters()"
          class="bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded-md hover:bg-gray-400 cursor-pointer w-full">
          Reset
        </button>
      </div>
    </div>
  </aside>
  
  @if (showActivatePopup()) {
  <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-2xl w-96 p-6">
      <h1 class="text-2xl font-bold text-blue-950 text-center mb-4">
        Add Mapped Attribute
      </h1>

      <form (ngSubmit)="addAttribute()">

        <div>
          <label class="block text-sm font-semibold text-gray-700 my-2 p-2">Category</label>
          <select (change)="onCategoryChange($event)" class="border border-gray-400 rounded-md px-3 py-2 w-full">
            <option value="">All</option>
            @for(cat of categories(); track cat.productCategoryId) {
            <option [value]="cat.productCategoryId" [selected]="productCategoryId() === cat.productCategoryId">
              {{cat.productCategoryName}}
            </option>
            }
          </select>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 my-2 p-2">Sub Category</label>
          <select (change)="onAddFormSubcategoryChange($event)"
            class="border border-gray-400 rounded-md px-3 py-2 w-full" [disabled]="!productCategoryId()">
            @if(!productCategoryId()) {
            <option value="">Select category first</option>
            }
            @else{
            <option value="">All</option>
            }
            @for(sub of subCategories(); track sub.productSubCategoryId) {
            <option [value]="sub.productSubCategoryId">
              {{sub.productSubCategoryName}}
            </option>
            }
          </select>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 my-2 p-2">Attribute</label>
          <select (change)="onAddFormAttributeChange($event)"
            class="border border-gray-400 rounded-md px-3 py-2 w-full">
            <option value="">All</option>
            @for(sub of masterattribute()?.items ?? []; track sub.attributeMasterId) {
            <option [value]="sub.attributeMasterId">
              {{sub.attributeName}}
            </option>
            }
          </select>
        </div>

        <div class="flex justify-end gap-3 mt-5">
          <button type="button" class="px-4 py-2 rounded-lg bg-gray-300 hover:bg-gray-400" (click)="closePopup()">
            Cancel
          </button>

          <button type="submit" class="px-4 py-2 rounded-lg bg-blue-700 text-white hover:bg-blue-900">
            Add
          </button>
        </div>
      </form>
    </div>
  </div>
  }
</section>
