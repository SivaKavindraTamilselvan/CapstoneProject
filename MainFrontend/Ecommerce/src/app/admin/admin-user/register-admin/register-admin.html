<section class="flex justify-center px-16">
    <div class="bg-white p-16 rounded-2xl shadow-2xl shadow-white/30 w-full space-y-10">
        <h1 class="text-blue-950 font-extrabold text-center text-2xl">REGISTER ADMIN USER</h1>
        @if(errorMessage())
        {
        <div class="bg-red-600 px-4 py-3 rounded-sm text-white text-center font-bold"> {{errorMessage()}} </div>
        }
        <form (ngSubmit)="handleRegisterClick()" class="flex flex-col space-y-5">
            <div class="flex gap-4">
                <div class="flex-1">
                    <label class="font-bold text-lg">Email</label>
                    <input type="email" placeholder="Enter your Email"
                        [formField]="registerForm.requestRegisterUserDTO.email"
                        class="w-full border rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-blue-700 focus:border-transparent transition" />
                </div>
                <div class="flex-1">
                    <label class="font-bold text-lg">Phone Number</label>
                    <input type="text" placeholder="Enter your PhoneNumber"
                        [formField]="registerForm.requestRegisterUserDTO.phoneNumber"
                        class="w-full border rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-blue-700 focus:border-transparent transition" />
                </div>
            </div>
            <div class="flex gap-4">
                <div class="flex-1">
                    <label class="font-bold text-lg">First Name</label>
                    <input placeholder="Enter your First Name"
                        [formField]="registerForm.requestRegisterUserDTO.firstName"
                        class="w-full border rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-blue-700 focus:border-transparent transition" />
                </div>
                <div class="flex-1">
                    <label class="font-bold text-lg">Last Name</label>
                    <input placeholder="Enter your Last Name" [formField]="registerForm.requestRegisterUserDTO.lastName"
                        class="w-full border rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-blue-700 focus:border-transparent transition" />
                </div>
            </div>

            <label class="font-bold text-lg">Password</label>
            <input type="password" placeholder="Enter your Password"
                [formField]="registerForm.requestRegisterUserDTO.password"
                class="w-full border rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-blue-700 focus:border-transparent transition" />

            <label class="font-bold text-lg">Admin Role Id</label>
            <select [formField]="registerForm.adminRoleId"
                class="w-full border rounded-md px-4 py-3 outline-none focus:ring-2 focus:ring-blue-700 focus:border-transparent transition">
                <option value="">Select Admin Role</option>
                <option value="2">Vendor Admin</option>
                <option value="3">Product Admin</option>
                <option value="4">Order Admin</option>
                <option value="5">Shipment Admin</option>
                <option value="6">Return Admin</option>
                <option value="7">Refund Admin</option>
                <option value="8">Payment Admin</option>
                <option value="9">Report Admin</option>
            </select>

            <button type="submit"
                class="bg-green-800 text-white font-bold px-4 py-3 rounded-lg cursor-pointer hover:bg-green-900">Submit</button>
        </form>
    </div>
</section>
