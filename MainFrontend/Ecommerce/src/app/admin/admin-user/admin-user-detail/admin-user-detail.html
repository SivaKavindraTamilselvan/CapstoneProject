<section class="bg-white py-12 px-4 sm:px-6 lg:px-12 flex flex-col items-center justify-center">
    <app-detailed-card-componenet [title]="adminUser().adminRoleName" [row]="adminUser()" [columns]="columns"
        [actions]="actions" (actionClick)="handleAction($event)">
    </app-detailed-card-componenet>

    <app-popup-component [show]="showPopup()" [title]="popupTitle()" [titleClass]="titleClass()"
        [message]="popupMessage()" [confirmText]="popupConfirmText()" cancelText="Cancel"
        [confirmButtonClass]="popupButtonClass()" (confirm)="confirmPopup()" (cancel)="closePopup()">
    </app-popup-component>
</section>
