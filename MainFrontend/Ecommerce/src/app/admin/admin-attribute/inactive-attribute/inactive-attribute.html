<section class="bg-white px-8 py-8">
    <div class="pb-8 relative flex items-center justify-center">
        <h1 class="text-blue-950 font-extrabold text-center text-2xl">Inactive Attribute</h1>
        <button (click)="toggleFilterPanel()" class="absolute right-0 p-2 rounded-md hover:bg-gray-100 cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-blue-950" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </button>
    </div>

    <app-filter-component [open]="filterPanelOpen()" title="Attribute Filters" (close)="closeFilterPanel()"
        (apply)="applyFilters()" (reset)="resetFilters()">

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Added Admin</label>
            <input type="number" placeholder="Admin ID" [value]="addedByAdminId()" (input)="onAdminIdInput($event)"
                class="border border-gray-400 rounded-md px-3 py-2 w-full" />
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Attribute Name</label>
            <input placeholder="Attribute Name" [value]="attributeName()" (input)="onAttributeNameInput($event)"
                class="border border-gray-400 rounded-md px-3 py-2 w-full" />
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Status</label>
            <select (change)="onStatusChange($event)" class="border border-gray-400 rounded-md px-3 py-2 w-full">
                <option value="">All</option>
                <option value="true" [selected]="status() === true">Active</option>
                <option value="false" [selected]="status() === false">Inactive</option>
            </select>
        </div>

    </app-filter-component>
    

    <app-data-table-component [columns]="columns" [rows]="attribute()?.items ?? []" [actions]="actions"
        (action)="handleAction($event)">
    </app-data-table-component>

    <app-mobile-card-component [columns]="mobileColumns" [rows]="attribute()?.items ?? []" [actions]="actions"
        [titleKey]="'attributeMasterId'" (action)="handleAction($event)">
    </app-mobile-card-component>

    <app-pagination-component [pageNumber]="pageNumber()" [totalPages]="totalPages()"
        [totalCount]="attribute()?.totalCount ?? 0" [pageSize]="pageSize()" (previous)="previousPage()"
        (next)="nextPage()" (pageSizeChange)="onPageSizeChanged($event)">
    </app-pagination-component>

    @if(showDeactivatePopup())
    {
    <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl w-96 p-6">
            <h2 class="text-xl font-bold text-green-700 text-center">
                Confirm Activation
            </h2>
            <p class="text-gray-600 text-center mt-4">
                Are you sure you want to activate this category?
            </p>
            <div class="flex justify-center gap-4 mt-8">
                <button class="px-5 py-2 rounded-md bg-gray-300 font-semibold hover:bg-gray-400" (click)="closePopup()">
                    Cancel
                </button>

                <button class="px-5 py-2 rounded-md bg-green-700 text-white font-semibold hover:bg-green-900"
                    (click)="activateCategory()">
                    Activate
                </button>
            </div>
        </div>
    </div>
    }


    @if(attribute()){
    <div class="flex flex-col sm:flex-row items-center justify-between gap-3 mt-6">
        <div class="text-sm text-gray-600">
            Page {{pageNumber()}} of {{totalPages()}}. {{attribute()!.totalCount}} total attribute
        </div>
        <div class="flex items-center gap-2">
            <select (change)="onPageSizeChange($event)" class="border border-gray-400 rounded-md px-2 py-1">
                <option value="5" [selected]="pageSize() === 5">5 / page</option>
                <option value="10" [selected]="pageSize() === 10">10 / page</option>
                <option value="25" [selected]="pageSize() === 25">25 / page</option>
                <option value="50" [selected]="pageSize() === 50">50 / page</option>
            </select>
            <button (click)="previousPage()" [disabled]="pageNumber() === 1"
                class="bg-slate-800 text-white py-2 px-4 rounded-md font-bold disabled:opacity-40 disabled:cursor-not-allowed hover:bg-slate-950 cursor-pointer">
                Previous
            </button>
            <button (click)="nextPage()" [disabled]="pageNumber() === totalPages()"
                class="bg-slate-800 text-white py-2 px-4 rounded-md font-bold disabled:opacity-40 disabled:cursor-not-allowed hover:bg-slate-950 cursor-pointer">
                Next
            </button>
        </div>
    </div>
    }
</section>
