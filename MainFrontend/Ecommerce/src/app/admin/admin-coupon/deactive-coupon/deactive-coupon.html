<section class="bg-white p-8">
    <div class="pb-8 flex items-center justify-center relative">
        <h1 class="text-blue-950 font-extrabold text-center text-2xl">Coupons</h1>
        <div class="absolute right-0 flex items-center gap-2">
            @if(filterapplied()){
            <button type="button" class="p-2 hover:bg-gray-100 cursor-pointer rounded-md" (click)="resetFilters()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
                </svg>
            </button>
            }
            <button (click)="toggleFilterPanel()" class="p-2 hover:bg-gray-100 cursor-pointer rounded-md">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-blue-950" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
        </div>
    </div>

    <app-filter-component [open]="filterPanelOpen()" title="Attribute Filters" (close)="closeFilterPanel()"
        (apply)="applyFilters()" (reset)="resetFilters()">

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Search (Code / Description)</label>
            <input type="text" placeholder="Search coupons" [value]="search()" (input)="onSearchInput($event)"
                class="border border-gray-400 rounded-md px-3 py-2 w-full" />
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Coupon Type</label>
            <select (change)="onCouponTypeChange($event)" class="border border-gray-400 rounded-md px-3 py-2 w-full">
                <option value="">All</option>
                @for(opt of couponTypeOption; track opt.id){
                <option [value]="opt.id" [selected]="couponTypeId() == opt.id">{{opt.label}}</option>
                }
            </select>
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Discount Value</label>
            <div class="flex gap-4">
                <input type="number" placeholder="Min" [value]="minDiscountValue()"
                    (input)="onMinDiscountValueInput($event)"
                    class="border border-gray-400 rounded-md px-3 py-2 w-full" />
                <input type="number" placeholder="Max" [value]="maxDiscountValue()"
                    (input)="onMaxDiscountValueInput($event)"
                    class="border border-gray-400 rounded-md px-3 py-2 w-full" />
            </div>
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Min Order Amount</label>
            <div class="flex gap-4">
                <input type="number" placeholder="Min" [value]="minOrderAmount()"
                    (input)="onMinOrderAmountInput($event)"
                    class="border border-gray-400 rounded-md px-3 py-2 w-full" />
                <input type="number" placeholder="Max" [value]="maxOrderAmount()"
                    (input)="onMaxOrderAmountInput($event)"
                    class="border border-gray-400 rounded-md px-3 py-2 w-full" />
            </div>
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Valid From</label>
            <input type="date" (change)="onValidFromChange($event)"
                class="border border-gray-400 rounded-md px-3 py-2 w-full" />
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Valid To</label>
            <input type="date" (change)="onValidToChange($event)"
                class="border border-gray-400 rounded-md px-3 py-2 w-full" />
        </div>
        <div>
            <label class="text-sm font-semibold text-gray-700 mb-1">Expired</label>
            <select (change)="onExpiredChange($event)" class="border border-gray-400 rounded-md px-3 py-2 w-full">
                <option value="">All</option>
                <option value="true" [selected]="isExpired() === true">Expired</option>
                <option value="false" [selected]="isExpired() === false">Not Expired</option>
            </select>
        </div>
        
    </app-filter-component>

    <app-data-table-component [columns]="columns" [rows]="coupons()?.items ?? []" [actions]="actions"
        (action)="handleAction($event)">
    </app-data-table-component>

    <app-mobile-card-component [columns]="mobileColumns" [rows]="coupons()?.items ?? []" [actions]="actions"
        (action)="handleAction($event)" [titleKey]="'productCategoryId'">
    </app-mobile-card-component>

    <app-pagination-component [pageNumber]="pageNumber()" [totalPages]="totalPages()"
        [totalCount]="coupons()?.totalCount ?? 0" [pageSize]="pageSize()" (previous)="previousPage()"
        (next)="nextPage()" (pageSizeChange)="onPageSizeChanged($event)">
    </app-pagination-component>


    @if(showactivatePopup())
    {
    <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl w-96 p-6">
            <h2 class="text-xl font-bold text-green-700 text-center">
                Confirm Activation
            </h2>
            <p class="text-gray-600 text-center mt-4">
                Are you sure you want to activate this coupon?
            </p>
            <div class="flex justify-center gap-4 mt-8">
                <button class="px-5 py-2 rounded-md bg-gray-300 font-semibold hover:bg-gray-400" (click)="closePopup()">
                    Cancel
                </button>

                <button class="px-5 py-2 rounded-md bg-green-700 text-white font-semibold hover:bg-green-900"
                    (click)="activateCoupon()">
                    Activate
                </button>
            </div>
        </div>
    </div>
    }
</section>
