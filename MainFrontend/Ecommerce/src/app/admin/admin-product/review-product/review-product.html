<section class="bg-white px-8 py-8">
    <div class="pb-8 relative flex items-center justify-center">
        <h1 class="text-blue-950 font-extrabold text-center text-xl sm:text-2xl">Review Product List</h1>
        <div class="absolute right-0 flex items-center gap-0 sm:gap-2">
            @if(filterapplied()){
            <button type="button" class="p-2 hover:bg-gray-100 cursor-pointer rounded-md" (click)="resetFilters()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
                </svg>
            </button>
            }
            <button (click)="toggleFilterPanel()" class="hover:bg-gray-100 cursor-pointer rounded-md">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-blue-950" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
        </div>
    </div>

    <app-filter-component [open]="filterPanelOpen()" title="Attribute Filters" (close)="closeFilterPanel()"
        (apply)="applyFilters()" (reset)="resetFilters()">

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Search</label>
            <input type="text" placeholder="Product name..." [value]="searchTerm()" (input)="onSearchTermInput($event)"
                class="border border-gray-400 rounded-md px-3 py-2 w-full" />
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Vendor ID</label>
            <input type="number" placeholder="Vendor ID" [value]="vendorId()" (input)="onVendorIdInput($event)"
                class="border border-gray-400 rounded-md px-3 py-2 w-full" />
        </div>
        
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Category</label>
            <select (change)="onCategoryChange($event)" class="border border-gray-400 rounded-md px-3 py-2 w-full">
                <option value="">All</option>
                @for(cat of categories(); track cat.productCategoryId) {
                <option [value]="cat.productCategoryId" [selected]="productCategoryId() === cat.productCategoryId">
                    {{cat.productCategoryName}}
                </option>
                }
            </select>
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Sub Category</label>
            <select (change)="onSubcategoryChange($event)" class="border border-gray-400 rounded-md px-3 py-2 w-full"
                [disabled]="!productCategoryId()">
                @if(!productCategoryId()) {
                <option value="">Select category first</option>
                }
                @else{
                <option value="">All</option>
                }
                @for(sub of subCategories(); track sub.productSubCategoryId) {
                <option [value]="sub.productSubCategoryId"
                    [selected]="productSubCategoryId() === sub.productSubCategoryId">
                    {{sub.productSubCategoryName}}
                </option>
                }
            </select>
        </div>


        <div class="flex items-center gap-2">
            <input type="checkbox" id="hasIssues" [checked]="hasIssues()" (change)="onHasIssuesChange($event)" />
            <label for="hasIssues" class="text-sm font-semibold text-gray-700">Has Issues</label>
        </div>

        

    </app-filter-component>

    <app-data-table-component [columns]="columns" [rows]="products()?.items ?? []" [actions]="actions"
        (action)="handleAction($event)">
    </app-data-table-component>

    <app-mobile-card-component [columns]="mobileColumns" [rows]="products()?.items ?? []" [actions]="actions"
        [titleKey]="'productId'" (action)="handleAction($event)">
    </app-mobile-card-component>

    <app-pagination-component [pageNumber]="pageNumber()" [totalPages]="totalPages()"
        [totalCount]="products()?.totalCount ?? 0" [pageSize]="pageSize()" (previous)="previousPage()"
        (next)="nextPage()" (pageSizeChange)="onPageSizeChanged($event)">
    </app-pagination-component>

    @if(showActivatePopup()) {
    <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl w-96 p-6 space-y-6">

            <h1 class="text-2xl font-bold text-blue-950 text-center">
                Review Product
            </h1>

            @if(successMessage()) {
            <div class="bg-green-600 px-4 py-3 rounded-md text-white text-center font-bold my-2">{{successMessage()}}
            </div>
            }
            @if(errorMessage())
            {
            <div class="bg-red-600 px-4 py-3 rounded-sm text-white text-center font-bold my-2"> {{errorMessage()}}
            </div>
            }
            <form class="space-y-4" (ngSubmit)="handleReview()">
                <label class="block text-sm font-semibold text-gray-700 mb-1">Approval Status</label>
                <select [formField]="reviewForm.approvalStatusId"
                    class="w-full border rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-blue-700">
                    <option value="">Select The Status</option>
                    <option value="4">Approve</option>
                    <option value="5">Reject</option>
                </select>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Remarks</label>
                <textarea [formField]="reviewForm.remark" type="text" rows="4" placeholder="Enter The Remarks"
                    class="w-full border rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-blue-700"></textarea>
                <div class="flex justify-end gap-3 pt-4">
                    <button type="button" class="px-5 py-2 rounded-md bg-gray-300 font-semibold hover:bg-gray-400"
                        (click)="closePopup()">
                        Cancel
                    </button>
                    <button type="submit"
                        class="px-5 py-2 rounded-md bg-blue-700 text-white font-semibold hover:bg-blue-900">
                        Submit
                    </button>
                </div>
            </form>
        </div>
    </div>
    }

    @if(products()){
    <div class="flex flex-col sm:flex-row items-center justify-between gap-3 mt-6">
        <div class="text-sm text-gray-600">
            Page {{pageNumber()}} of {{totalPages()}} . {{products()!.totalCount}} total products
        </div>
        <div class="flex items-center gap-2">
            <select (change)="onPageSizeChange($event)" class="border border-gray-400 rounded-md px-2 py-1">
                <option value="10" [selected]="pageSize() === 10">10 / page</option>
                <option value="25" [selected]="pageSize() === 25">25 / page</option>
                <option value="50" [selected]="pageSize() === 50">50 / page</option>
            </select>
            <button (click)="previousPage()" [disabled]="pageNumber() === 1"
                class="bg-slate-800 text-white py-2 px-4 rounded-md font-bold disabled:opacity-40 disabled:cursor-not-allowed hover:bg-slate-950 cursor-pointer">
                Previous
            </button>
            <button (click)="nextPage()" [disabled]="pageNumber() === totalPages()"
                class="bg-slate-800 text-white py-2 px-4 rounded-md font-bold disabled:opacity-40 disabled:cursor-not-allowed hover:bg-slate-950 cursor-pointer">
                Next
            </button>
        </div>
    </div>
    }
</section>
