<button (click)="goBack()"
    class="flex gap-1.5 text-sm p-6 font-semibold text-slate-600 hover:text-slate-900 mb-4 sm:mb-6 cursor-pointer transition">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
        stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
    </svg>
    Back to Warehouse List
</button>
<section class="bg-white px-4 sm:px-6 lg:px-12 flex flex-col items-center justify-center">
    @if (loading()) {
    <div class="flex justify-center items-center py-20">
        <p class="text-gray-500 font-semibold">Loading address details...</p>
    </div>
    }
    @else if (errorMessage()) {
    <div class="bg-red-600 px-4 py-3 rounded-md text-white text-center font-bold my-4 w-full max-w-md">
        {{ errorMessage() }}
    </div>
    }
    @else if (address(); as addr) {
    <app-detailed-card-componenet [title]="addr.contactName" [row]="addr" [columns]="columns" [actions]="actions"
        (actionClick)="handleAction($event)">
    </app-detailed-card-componenet>
    }
   <app-popup-component [show]="showPopup()" [title]="popupTitle()" [titleClass]="titleClass()"
        [message]="popupMessage()" [confirmText]="popupConfirmText()" cancelText="Cancel"
        [confirmButtonClass]="popupButtonClass()" (confirm)="confirmPopup()" (cancel)="closePopup()">
    </app-popup-component>

    @if (showAddInventoryPopup()) {
    <app-add-inventory-component [addressId]="selectedAddressIdForInventory()" (closed)="closeInventoryPopup()">
    </app-add-inventory-component>
    }
</section>
