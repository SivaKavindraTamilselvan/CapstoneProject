<section class="bg-white p-8">
    <div class="pb-8 relative flex items-center justify-center">
        <h1 class="text-blue-950 font-extrabold text-center text-2xl">Admin Users</h1>
        <div class="absolute right-0 flex items-center gap-2">
            @if(filterApplied()){
            <button type="button" class="sm:p-2 hover:bg-gray-100 cursor-pointer rounded-md" (click)="resetFilters()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
                </svg>
            </button>
            }
            <button (click)="toggleFilterPanel()" class="p-2 hover:bg-gray-100 cursor-pointer rounded-md">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-blue-950" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
        </div>
    </div>

    <app-filter-component [open]="filterPanelOpen()" title="Attribute Filters" [errorMessage]="filterErrorMessage()"
        (toggle)="toggleFilterPanel()" (close)="closeFilterPanel()" (apply)="applyFilters()" (reset)="resetFilters()">
        <div>
            <label class="text-sm font-semibold text-gray-700 mb-1">Phone Number</label>
            <input [formField]="filterForm.phoneNumber" class="border border-gray-400 rounded-md px-3 py-2 w-full"
                placeholder="Enter the phone number" />
            @if (filterForm.phoneNumber().invalid())
            {
            <p class="text-red-600 text-xs mt-1">{{ filterForm.phoneNumber().errors()[0].message }}</p>
            }
        </div>
        <div>
            <label class="text-sm font-semibold text-gray-700 mb-1">Email</label>
            <input [formField]="filterForm.email" class="border border-gray-400 rounded-md px-3 py-2 w-full"
                placeholder="Enter the email" />
            @if (filterForm.email().invalid())
            {
            <p class="text-red-600 text-xs mt-1">{{ filterForm.email().errors()[0].message }}</p>
            }
        </div>
        <div>
            <label class="text-sm font-semibold text-gray-700 mb-1">Admin Role</label>
            <div>
                <select (change)="onAdminRoleChange($event)"
                    class="block border border-gray-400 rounded-md px-3 py-2 w-full">
                    <option>All</option>
                    @for(opt of adminRoleOption; track opt.id){
                    <option [value]="opt.id" [selected]="adminUserFilter().vendorRoleId == opt.id">{{opt.label}}
                    </option>
                    }
                </select>
            </div>

        </div>
    </app-filter-component>

    <app-data-table-component [columns]="columns" [rows]="adminUsers()?.items ?? []" [actions]="actions()"
        (action)="handleAction($event)">
    </app-data-table-component>

    <app-mobile-card-component [columns]="mobileColumns" [rows]="adminUsers()?.items ?? []" [actions]="actions()"
        (action)="handleAction($event)" [titleKey]="'vendorUserId'">
    </app-mobile-card-component>

    <app-pagination-component [pageNumber]="pageNumber()" [totalPages]="totalPages()"
        [totalCount]="adminUsers()?.totalCount ?? 0" [pageSize]="pageSize()" (previous)="previousPage()"
        (next)="nextPage()" (pageSizeChange)="onPageSizeChanged($event)">
    </app-pagination-component>

    <app-popup-component [show]="showPopup()" [title]="popupTitle()" [titleClass]="titleClass()"
        [message]="popupMessage()" [confirmText]="popupConfirmText()" cancelText="Cancel"
        [confirmButtonClass]="popupButtonClass()" (confirm)="confirmPopup()" (cancel)="closePopup()">
    </app-popup-component>


</section>
