<section class="bg-white p-2 md:px-6 lg:px-8 mt-4 lg:py-4">
    <div class="pb-4 flex items-center justify-center">
        <h1 class="text-blue-950 font-extrabold text-center text-2xl">
            Add Product
        </h1>
    </div>
    <div class="flex justify-center px-2">
        <div class="bg-white rounded-2xl shadow-2xl shadow-white/30 w-full max-w-4xl p-8 space-y-6">
            @if(errorMessage()) {
            <div class="bg-red-600 px-4 py-3 rounded-md text-white text-center font-bold">
                {{errorMessage()}}
            </div>
            }
            @if(successMessage()){
            <p class="bg-green-100 px-4 py-3 rounded-md text-white text-center font-bold">
                {{ successMessage() }}
            </p>
            }

            <form (ngSubmit)="addProduct()" class="flex flex-col gap-5">
                <div>
                    <label class="block font-semibold mb-1">Product Name</label>
                    <input type="text" [formField]="addForm.productName"
                        class="w-full border rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-blue-700"
                        placeholder="Enter product name">
                </div>
                <div>
                    <label class="block font-semibold mb-1">Description</label>
                    <textarea [formField]="addForm.description"
                        class="w-full border rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-blue-700"
                        rows="4" placeholder="Enter product description"></textarea>
                </div>

                <div>
                    <label class="block font-semibold mb-1">Sub Category ID</label>
                    <input type="number" [formField]="addForm.productSubCategoryId"
                        class="w-full border rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-blue-700"
                        placeholder="Enter sub-category ID">
                </div>

                <div>
                    <label class="block font-semibold mb-1">Main Attribute ID</label>
                    <input type="number" [formField]="addForm.mainProductSubCategoryAttributeId"
                        class="w-full border rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-blue-700"
                        placeholder="Enter main attribute ID">
                </div>

                <div>
                    <label class="block font-semibold mb-1">Product Images</label>
                    <input type="file" multiple accept="image/*" (change)="onImageSelected($event)"
                        class="w-full border rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-blue-700" />

                </div>

                @if(productImages().length > 0){
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    @for(img of productImages(); track $index){
                    <div class="border rounded-lg p-2 relative">
                        <img [src]="img.imageUrl" class="w-full h-28 object-cover rounded">

                        <button type="button" (click)="setMainImage($index)"
                            class="mt-2 w-full text-sm py-1 rounded text-white" [class.bg-green-700]="img.isMainImage"
                            [class.bg-blue-700]="!img.isMainImage">
                            {{ img.isMainImage ? 'Main Image' : 'Set Main' }}
                        </button>

                        <button type="button" (click)="removeImage($index)"
                            class="mt-2 w-full bg-red-600 text-white text-sm py-1 rounded">
                            Remove
                        </button>
                    </div>
                    }
                </div>
                }

                <button type="submit"
                    class="bg-blue-950 text-white px-6 py-2 rounded-lg font-semibold hover:bg-blue-900">
                    Add Product
                </button>

            </form>
        </div>
    </div>
</section>
