<div class="fixed inset-0 bg-black/50 flex items-center justify-center w-full p-4 z-50">
    <div class="w-full max-w-md rounded-xl bg-white p-6 sm:p-8 shadow-2xl">
        <h2 class="text-center text-xl font-bold text-slate-800">
            Review Returned Product
        </h2>
        <p class="text-gray-600 font-semibold text-sm sm:text-base text-justify mt-4">
            Choose whether to accept this return and issue the standard refund, or request an additional refund for damage or other reasons.
        </p>

        @if(successMessage()) {
        <div class="bg-green-600 px-4 py-3 rounded-md text-white text-center font-bold my-4">
            {{ successMessage() }}
        </div>
        }
        @if(errorMessage()) {
        <div class="bg-red-600 px-4 py-3 rounded-md text-white text-center font-bold my-4">
            {{ errorMessage() }}
        </div>
        }

        <div class="flex flex-col gap-3 pt-6">
            <div class="flex justify-center gap-3">
                <button type="button" [disabled]="progress()" class="flex-1 px-4 py-2 rounded-md bg-blue-700 text-white font-semibold 
                    hover:bg-blue-900 disabled:opacity-60" (click)="acceptAndRefund()">
                    {{ progress() ? 'Processing...' : 'Accept & Refund' }}
                </button>
                <button type="button" [disabled]="progress()" class="flex-1 px-4 py-2 rounded-md bg-amber-600 text-white font-semibold 
                    hover:bg-amber-800 disabled:opacity-60" (click)="openAdditionalRefund()">
                    Request Additional Refund
                </button>
            </div>

            <button type="button" [disabled]="progress()" class="px-5 py-2 rounded-md bg-gray-300 font-semibold 
                hover:bg-gray-400 disabled:opacity-60" (click)="close()">
                Cancel
            </button>
        </div>
    </div>
</div>
