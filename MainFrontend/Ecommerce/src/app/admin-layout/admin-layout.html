<div class="flex">

    <section
        class="min-h-screen flex flex-col bg-gradient-to-br from-slate-950 via-blue-950 to-indigo-900 w-64 top-0 left-0 fixed lg:static lg:translate-x-0 z-40 inset-y-0"
        [ngClass]="mobileMenuOpen() ? 'translate-x-0' : '-translate-x-full'">
        <div class="px-4 py-8 flex items-center justify-between">
            <h1 class="text-blue-200 font-extrabold text-center text-xl">ADMIN PANEL</h1>
            <button class="lg:hidden text-white" (click)="closeMobileMenu()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        <nav class="flex-1 gap-1 overflow-y-auto w-full flex flex-col">

            @for (menu of menus ; track menu.key)
            {
            <a class="px-4 py-3 transition font-medium cursor-pointer" (click)="toggleMenu(menu.key)"
                [ngClass]="activeMenu()===menu.key ? 'bg-white text-black' : 'text-white hover:text-black hover:bg-white' ">
                {{menu.label}}
            </a>
            @if(activeMenu()===menu.key)
            {
            @for(child of menu.children;track child.route)
            {
            <a class="px-10 py-3 text-white hover:text-gray-400 cursor-pointer" [routerLink]="child.route"
                (click)="closeMobileMenu()">
                {{child.label}}
            </a>
            }
            }
            }

        </nav>
    </section>
    <div class="flex-1 flex flex-col w-full">
        <header
            class="flex justify-between items-center w-full bg-gradient-to-br from-slate-800 via-blue-950 to-indigo-900 h-16 sm:h-16 md:h-20 lg:h-24 px-4 sm:px-6 lg:px-10">
            <div class="flex items-center gap-3">
                <button class="lg:hidden text-white" (click)="toggleMobileMenu()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" class="size-6">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M3.75 6.75h16.5M3.75 12h16.5M3.75 17.25h16.5" />
                    </svg>
                </button>
                <p class="text-white font-extrabold text-lg sm:text-xl">ShopperApp</p>
            </div>
            <div class="flex gap-4 sm:gap-6 lg:gap-8 justify-end items-center text-white">
                @if (authState.isLoggedIn()) {
                <button class="group relative cursor-pointer hover:text-gray-500 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" class="size-6">

                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0M3.124 7.5A8.969 8.969 0 0 1 5.292 3m13.416 0a8.969 8.969 0 0 1 2.168 4.5" />

                    </svg>
                    <span
                        class="absolute hidden group-hover:block py-1 px-3 text-sm text-black bg-white rounded-sm shadow-md whitespace-nowrap top-8 right-0">Notification</span>
                </button>
                <button class="group relative cursor-pointer hover:text-gray-500 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="1.5"
                        stroke="currentColor" class="size-7">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                    </svg>
                    <span
                        class="absolute top-8 right-0 hidden group-hover:block bg-white text-black text-sm py-1 px-3 shadow-md rounded-sm whitespace-nowrap">Profile</span>
                </button>

                <button
                    class="group relative flex items-center gap-2 cursor-pointer text-white hover:text-gray-500 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="size-5">

                        <path fill-rule="evenodd" clip-rule="evenodd"
                            d="M3.5 9.75A2.75 2.75 0 0 1 6.25 7h5.19L9.22 9.22a.75.75 0 1 0 1.06 1.06l3.5-3.5a.75.75 0 0 0 0-1.06l-3.5-3.5a.75.75 0 1 0-1.06 1.06l2.22 2.22H6.25a4.25 4.25 0 0 0 0 8.5h1a.75.75 0 0 0 0-1.5h-1A2.75 2.75 0 0 1 3.5 9.75Z" />
                    </svg>
                    <span
                        class="absolute top-8 right-0 hidden group-hover:block text-sm text-black bg-white py-1 px-3 rounded-sm whitespace-nowrap shadow-md">Logout</span>
                </button>
            }
            @else {
                <button class="group relative cursor-pointer hover:text-gray-500 transition" (click)="goToLogin()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" class="size-6">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l3 3m0 0-3 3m3-3H3" />
                    </svg>
                    <span
                        class="absolute top-8 right-0 hidden group-hover:block text-sm text-black bg-white py-1 px-3 rounded-sm whitespace-nowrap shadow-md">
                        Login
                    </span>
                </button>
            }
            </div>
        </header>
        <main class="overflow-x-hidden">
            <router-outlet></router-outlet>
        </main>
    </div>
</div>
