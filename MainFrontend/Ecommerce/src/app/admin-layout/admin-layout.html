<div class="flex">
    <section class="min-h-screen bg-gradient-to-br from-slate-950 via-blue-950 to-indigo-900 w-64 top-0 left-0">
        <div class="px-4 py-8">
            <h1 class="text-blue-200 font-extrabold text-center text-xl">ADMIN PANEL</h1>
        </div>
        <nav class="gap-1 overflow-y-auto w-full flex flex-col">

            @for (menu of menus ; track menu.key)
            {
                <a class="px-4 py-3 transition font-medium cursor-pointer" (click)="toggleMenu(menu.key)"
                    [ngClass]="activeMenu()===menu.key ? 'bg-white text-black' : 'text-white hover:text-black hover:bg-white' ">
                    {{menu.label}}
                </a>
                @if(activeMenu()===menu.key)
                {
                    @for(child of menu.children;track child.route)
                    {
                        <a class="px-10 py-3 text-white hover:text-gray-400 cursor-pointer">
                            {{child.label}}
                        </a>
                    }
                }
            }

        </nav>
    </section>
</div>
