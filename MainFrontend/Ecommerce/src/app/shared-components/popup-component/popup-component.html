@if (show()) {
<div class="fixed inset-0 bg-black/50 flex items-center justify-center w-full p-4 z-50">
    <div class="w-full max-w-md rounded-xl bg-white p-6 sm:p-8 shadow-2xl">
        <h2 class="text-center text-lg sm:text-xl font-bold" [ngClass]="titleClass()">
            {{ title() }}
        </h2>
        <p class="text-gray-600 text-sm sm:text-base text-center mt-4">
            {{ message() }}
        </p>
        @if(successMessage()) {
        <div class="bg-green-600 px-4 py-3 rounded-md text-white text-center text-sm font-bold my-4">
            {{ successMessage() }}
        </div>
        }
        @if(errorMessage()) {
        <div class="bg-red-600 px-4 py-3 rounded-md text-white text-center text-sm font-bold my-4">
            {{ errorMessage() }}
        </div>
        }
        <div class="flex justify-center gap-4 mt-8">
            <button class="px-5 py-2 rounded-md bg-gray-300 font-semibold hover:bg-gray-400" (click)="onCancel()"
                [disabled]="loading()">
                {{ cancelText() }}
            </button>
            <button [disabled]="loading()" class="rounded-md px-5 py-2 font-semibold text-white disabled:opacity-60 hover:cursor-pointer"  [ngClass]="confirmButtonClass()" 
                 (click)="onConfirm()">
                {{ loading() ? loadingText() : confirmText() }}
            </button>
        </div>
    </div>
</div>
}
