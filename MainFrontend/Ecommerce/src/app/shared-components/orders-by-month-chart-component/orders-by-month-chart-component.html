<div class="bg-white rounded-2xl shadow-sm ring-1 ring-slate-100 p-6">

    <div class="mb-5">
        <h2 class="text-lg font-bold text-slate-800">
            {{ title() }}
        </h2>
        <p class="text-sm text-slate-500">
            {{ subtitle() }}
        </p>
    </div>

    @if (loading()) {
    <div class="space-y-4 animate-pulse">
        @for (i of [1,2,3,4]; track i) {
        <div class="h-3 bg-slate-100 rounded-full"></div>
        }
    </div>
    } @else if (ordersByMonth().length > 0) {

    <div class="space-y-4">
        @for (item of ordersByMonth(); track item.month) {
        <div>
            <div class="flex justify-between items-baseline mb-1.5">
                <span class="text-sm text-slate-600">{{ item.month }}</span>
                <span class="text-sm font-semibold text-slate-800">{{ item.count }}</span>
            </div>

            <div class="w-full h-2.5 bg-slate-100 rounded-full overflow-hidden">
                <div class="h-full rounded-full bg-gradient-to-r from-blue-600 to-blue-500 transition-all duration-500"
                    [style.width.%]="monthBarWidth(item.count)">
                </div>
            </div>
        </div>
        }
    </div>

    } @else {

    <div class="flex flex-col items-center justify-center py-16 text-center">
        <div class="text-5xl mb-3"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                stroke-width="1.5" stroke="currentColor" class="w-16 h-16 text-slate-400 mb-3 mx-auto">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 3v18h18M7 14l4-4 3 3 5-6" />
            </svg></div>
        <h3 class="text-base font-semibold text-slate-700">
            No monthly data found
        </h3>
        <p class="text-sm text-slate-400 mt-1">
            Monthly order growth will appear here.
        </p>
    </div>

    }

</div>
