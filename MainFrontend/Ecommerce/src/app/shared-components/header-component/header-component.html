<div class="pb-8 relative flex items-center justify-center">
    <h1 class="text-blue-950 font-extrabold text-center text-xl sm:text-2xl">{{title()}}</h1>
    <div class="absolute right-0 flex items-center gap-2">
        @if(filterApplied()){
        <button type="button" class="sm:p-2 hover:bg-gray-100 cursor-pointer rounded-md" (click)="reset.emit()">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="w-6 h-6">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
            </svg>
        </button>
        }
        <button (click)="toggle.emit()" class="hover:bg-gray-100 cursor-pointer rounded-md">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-blue-950" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </button>
    </div>
</div>
