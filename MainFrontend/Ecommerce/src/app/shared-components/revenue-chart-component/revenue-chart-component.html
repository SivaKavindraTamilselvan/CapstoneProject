<div class="bg-white rounded-xl shadow-md p-6">

    <div class="flex items-center justify-between mb-6">
        <div>
            <h2 class="text-xl font-bold text-gray-800">{{ title() }}</h2>
            <p class="text-sm text-gray-500">
                {{ subtitle() }}
            </p>
        </div>

        <select
            class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-600"
            (change)="changePeriod($any($event.target).value)">
            <option value="7days">Last 7 Days</option>
            <option value="30days">Last 30 Days</option>
            <option value="12months">Last 12 Months</option>
        </select>
    </div>

    @if (revenueTrend().length > 0) {

    <div class="overflow-x-auto">

        <table class="min-w-full">

            <thead class="bg-gray-100">
                <tr>
                    <th class="px-5 py-3 text-left text-sm font-semibold text-gray-700">
                        Period
                    </th>
                    <th class="px-5 py-3 text-right text-sm font-semibold text-gray-700">
                        Revenue
                    </th>
                </tr>
            </thead>

            <tbody>

                @for (item of revenueTrend(); track item.label) {

                <tr class="border-b last:border-b-0 hover:bg-gray-50">

                    <td class="px-5 py-4 font-medium text-gray-700">
                        {{ item.label }}
                    </td>

                    <td class="px-5 py-4 text-right font-semibold text-green-700">
                        {{ item.revenue | currency:'INR':'symbol':'1.0-0' }}
                    </td>

                </tr>

                }

            </tbody>

        </table>

    </div>

    } @else {

    <div class="flex flex-col items-center justify-center py-16 text-center">

        <div class="text-5xl mb-3"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                stroke-width="1.5" stroke="currentColor" class="w-16 h-16 text-slate-400 mb-3">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M3 13.5h3v7.5H3v-7.5Zm7.5-6h3V21h-3V7.5Zm7.5-4.5h3V21h-3V3Z" />
            </svg></div>

        <h3 class="text-lg font-semibold text-gray-700">
            No revenue data found
        </h3>

        <p class="text-gray-500 mt-2">
            There are no delivered orders for the selected period.
        </p>

    </div>

    }

</div>
