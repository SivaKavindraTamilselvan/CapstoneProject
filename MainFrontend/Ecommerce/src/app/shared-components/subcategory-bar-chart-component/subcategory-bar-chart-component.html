<div class="bg-white rounded-2xl shadow-sm ring-1 ring-slate-100 p-6">

  <h2 class="text-lg font-bold text-slate-800 mb-4">
    {{ title() }}
  </h2>

  @if (loading()) {
    <div class="space-y-4 animate-pulse">
      @for (i of [1,2,3,4]; track i) {
        <div class="h-3 bg-slate-100 rounded-full"></div>
      }
    </div>
  } @else if (subCategories().length > 0) {

    <div class="space-y-4">
      @for (item of subCategories(); track item.subCategory) {
        <div>
          <div class="flex justify-between items-baseline mb-1.5">
            <span class="text-sm text-slate-600">{{ item.subCategory }}</span>
            <span class="text-sm font-semibold text-slate-800">{{ item.count }}</span>
          </div>

          <div class="w-full h-2.5 bg-slate-100 rounded-full overflow-hidden">
            <div
              class="h-full rounded-full bg-gradient-to-r from-emerald-600 to-emerald-500 transition-all duration-500"
              [style.width.%]="barWidth(item.count)">
            </div>
          </div>
        </div>
      }
    </div>

  } @else {
    <div class="py-16 text-center text-slate-400">
      No products found.
    </div>
  }

</div>
