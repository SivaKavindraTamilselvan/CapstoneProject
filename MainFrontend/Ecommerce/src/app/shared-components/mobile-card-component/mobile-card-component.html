<div class="md:hidden flex flex-col gap-4">

    @if(rows.length){

        @for(row of rows; track $index){

            <div class="border border-gray-300 rounded-lg p-4 shadow-sm overflow-x-hidden">

                <div class="flex items-center justify-between mb-3 pb-2 border-b border-gray-200">

                    <span class="font-bold text-blue-950">
                        #{{ row[titleKey] }}
                    </span>

                    <div class="flex gap-2">

                        @for(item of actions; track item.action){

                            <button
                                class="py-1.5 px-3 rounded-md font-bold text-white text-sm cursor-pointer"
                                [ngClass]="{
                                    'bg-green-700 hover:bg-green-900': item.color === 'green',
                                    'bg-red-700 hover:bg-red-900': item.color === 'red',
                                    'bg-blue-700 hover:bg-blue-900': item.color === 'blue',
                                    'bg-yellow-500 hover:bg-yellow-600': item.color === 'yellow'
                                }"
                                (click)="onAction(item,row)">

                                {{ item.label }}

                            </button>

                        }

                    </div>

                </div>

                <table class="w-full border border-gray-300 border-collapse table-fixed">

                    <colgroup>
                        <col class="w-1/3">
                        <col class="w-2/3">
                    </colgroup>

                    <tbody>

                        @for(column of columns; track column.key){

                            <tr>

                                <td class="font-semibold py-3 px-2 border border-gray-300 bg-gray-50">

                                    {{ column.header }}

                                </td>

                                <td class="py-3 px-2 border border-gray-300 break-words">

                                    {{ getCellValue(row,column) }}

                                </td>

                            </tr>

                        }

                    </tbody>

                </table>

            </div>

        }

    }

    @else{

        <div class="text-center text-gray-500 py-6">
            No data found.
        </div>

    }

</div>
