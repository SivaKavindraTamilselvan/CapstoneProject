@if (show()) {
<div class="fixed inset-0 bg-black/50 flex items-center justify-center w-full p-4 z-50">
    <div class="w-full max-w-md rounded-xl bg-white p-6 sm:p-8 shadow-2xl">
        <h2 class="text-center text-xl font-bold text-red-700">{{ title() }}</h2>
        <p class="text-gray-600 font-semibold text-sm sm:text-base text-justify mt-4">{{ message() }}</p>
        @if(successMessage()) {
        <div class="bg-green-600 px-4 py-3 rounded-md text-white text-center font-bold my-4">
            {{ successMessage() }}
        </div>
        }
        @if(errorMessage()) {
        <div class="bg-red-600 px-4 py-3 rounded-md text-white text-center font-bold my-4">
            {{ errorMessage() }}
        </div>
        }
        <form class="mt-6 space-y-4" (ngSubmit)="onConfirm()">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    {{ remarkLabel() }}
                </label>
                <textarea rows="4" [formField]="remarkField()" [placeholder]="remarkPlaceholder()"
                    class="w-full border rounded-lg px-4 py-3 outline-none focus:border-red-600 focus:ring-1 focus:ring-red-600">
                </textarea>
                @if (remarkField()().invalid() && remarkField()().touched()) {
                <p class="text-red-600 text-sm mt-1">
                    {{ remarkField()().errors()[0].message }}
                </p>
                }
            </div>
            <div class="flex justify-center gap-4 pt-2">
                <button type="button" [disabled]="loading()"
                    class="px-5 py-2 rounded-md bg-gray-300 font-semibold hover:bg-gray-400" (click)="onCancel()">
                    {{ cancelText() }}
                </button>
                <button type="submit" [disabled]="loading()"
                    class="px-5 py-2 rounded-md bg-red-700 text-white font-semibold hover:bg-red-800 disabled:opacity-60">
                    {{ loading() ? loadingText() : confirmText() }}
                </button>
            </div>
        </form>
    </div>
</div>
}
